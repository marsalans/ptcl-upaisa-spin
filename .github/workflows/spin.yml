name: PTCL Spin The Wheel

on:
  # Run automatically every day at 9:00 AM Pakistan time (4:00 AM UTC)
  schedule:
    - cron: "0 4 * * *"

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      spin_count:
        description: "Number of spins"
        required: false
        default: "1"

jobs:
  spin:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install Python dependencies ────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Install Playwright browser ─────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. Run the spin script ────────────────────────────────────
      - name: Run spin automation
        env:
          PTCL_NUMBER: ${{ secrets.PTCL_NUMBER }}
          SPIN_COUNT:  ${{ github.event.inputs.spin_count || '1' }}
          HEADLESS:    "true"
          SPIN_DELAY:  "5"
        run: python ptcl_spin_automation.py

      # ── 6. Upload screenshots + CSV as artifacts ──────────────────
      - name: Upload screenshots
        if: always()   # upload even if the script fails
        uses: actions/upload-artifact@v4
        with:
          name: spin-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7

      - name: Upload results CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spin-results-${{ github.run_number }}
          path: spin_results.csv
          retention-days: 30
